apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: codespace-ingress
  namespace: default
  labels:
    app.kubernetes.io/name: codespace-ingress

spec:
  ingressClassName: nginx

  rules:
    - host: "*.preview.localhost"
      http:
        paths:

          - path: /api/sandbox
            pathType: Prefix
            backend:
              service:
                name: sandbox-service
                port:
                  number: 80

          - path: /
            pathType: Prefix
            backend:
              service:
                name: router-service
                port:
                  number: 80